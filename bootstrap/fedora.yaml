---
- name: Update DNF Cache & Upgrade Packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  become: true

- name: Remove Orphaned Packages
  ansible.builtin.dnf:
    autoremove: true
  become: true

- name: Install Common Packages
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present
  become: true

- name: Install Desktop Environment Packages
  when: is_desktop_host
  ansible.builtin.dnf:
    name: "{{ desktop_environment_packages }}"
    state: present
  become: true

- name: Add Docker Repository
  ansible.builtin.yum_repository:
    name: docker
    description: https://docs.docker.com/engine/install/fedora/
    baseurl: "https://download.docker.com/linux/fedora/{{ ansible_facts.distribution_major_version }}/{{ ansible_facts.architecture }}/stable"
    gpgkey: "https://download.docker.com/linux/fedora/gpg"
    gpgcheck: true
    enabled: true
  become: true

- name: Install Docker Packages
  ansible.builtin.dnf:
    name: "{{ docker_packages[os_name] }}"
    state: present
  become: true

- name: Start Docker Engine
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: "Add {{ ansible_facts.user_id }} To Groups"
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    groups: docker
    append: true
  become: true

- name: Install Flatpaks
  when: is_desktop_host
  community.general.flatpak:
    name: "{{ flatpaks }}"
    state: latest
    remote: fedora
