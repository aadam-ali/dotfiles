- name: Update Apt Cache & Packages
  ansible.builtin.apt:
    name: "*"
    state: latest
    update_cache: true
  become: true

- name: Remove Orphaned Packages
  ansible.builtin.apt:
    autoremove: true
  become: true

- name: Install Common Packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  become: true

- name: Install Desktop Environment Packages
  when: is_desktop_host
  ansible.builtin.apt:
    name: "{{ desktop_environment_packages }}"
    state: present
  become: true

- name: Add Docker Repository
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_facts.distribution_release }}"
    components: stable
    architectures: amd64
    signed_by: https://download.docker.com/linux/ubuntu/gpg
  become: true

- name: Install Docker Packages
  ansible.builtin.apt:
    name: "{{ docker_packages[os_name] }}"
    update_cache: true
    state: present
  become: true

- name: Start Docker Engine
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: "Add {{ ansible_facts.user_id }} To Groups"
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    groups: docker
    append: true
  become: true

- name: Add Flathub Flatpak Repository
  when: is_desktop_host
  community.general.flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
  become: true

- name: Install Flatpaks
  when: is_desktop_host
  community.general.flatpak:
    name: "{{ flatpaks }}"
    state: latest
