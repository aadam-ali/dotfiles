##############
# APPEARANCE #
##############

set -g status on
set -g status-position top

set -g status-interval 1
set -g status-style fg=#94886e

prefix_mode="#{?client_prefix,[PREFIX] ,}"

set -g window-status-current-format '#[bold]#I:#W#{?window_zoomed_flag,[Z],}'
set -g window-status-format '#I:#W#{?window_zoomed_flag,[Z],}'
set -g status-left "${prefix_mode}"
set -g status-right "[#(whoami) @ #H] [%H:%M:%S]"

set-option -g default-terminal 'xterm-256color'
set-option -ga terminal-overrides ",xterm-256color:Tc"


#############
# BEHAVIOUR #
#############

# Enable Mouse
set -g mouse on

# Prevent Auto-copy When Using Mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Window Indexing Behaviour (Windows, Panes, Renumbering)
set -g base-index 0
setw -g pane-base-index 1
set-option -g renumber-windows on

set -g history-limit 10000


#############
#  KEYBINDS #
#############

# Reload Config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded"

# Reconfigure Pane Splitting
bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Enable Vim Navigation Keys
setw -g mode-keys vi

# Resize Panes
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r k resize-pane -U 5
bind -r j resize-pane -D 5

# Change Focused Pane
bind -n M-l select-pane -R
bind -n M-h select-pane -L
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Copy Buffer to System Clipboard
bind -r C-c run -b "tmux show-buffer | pbcopy"

# Run `tmux-*` Scripts
bind -r f run-shell "tmux-window"
bind -r s run-shell "tmux-session"
