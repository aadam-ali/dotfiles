---
de_pkgs: [sway, rofi, waybar, redshift, wlsunset, alacritty, pavucontrol, thunar, wl-clipboard, grimshot]
gui_pkgs: [md.obsidian.Obsidian, org.onlyoffice.desktopeditors]
docker_pkgs: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin, docker-buildx-plugin]
os_pkgs: [flatpak]

font_dir: "{{ ansible_facts['env']['HOME'] }}/.local/share/fonts"

# Linux Specific Vars
pkg_repos_signing_keys:
  /usr/share/keyrings/docker.asc: "https://download.docker.com/linux/{{ ansible_facts['distribution']|lower }}/gpg"

pkg_repos:
  docker: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.asc] https://download.docker.com/linux/{{ansible_facts['distribution']|lower }} {{ ansible_facts['distribution_release'] }} stable"
